<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapForge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Favicon.png">
  </head>

  <body>

    <div id="preloader">
      <div class="preloader-inner">
        <div class="preloader-title">
          <span>S</span><span>n</span><span>a</span><span>p</span><span>F</span><span>o</span><span>r</span><span>g</span><span>e</span>
        </div>
        <div class="preloader-sub">Forge moments from every snap</div>
        <div class="preloader-bar"><div class="preloader-fill"></div></div>
      </div>
    </div>

    <header class="site-header">
      <h1>SnapForge</h1>
      <p>Forge moments from every snap</p>
    </header>

    <div class="card">
      <div class="card-header">
        <span class="card-label">Live preview</span>
        <select id="numPhotos" class="photo-count-select">
          <option value="2">2 photos</option>
          <option value="3">3 photos</option>
          <option value="4" selected>4 photos</option>
          <option value="6">6 photos</option>
        </select>
      </div>

      <div class="preview-wrapper">
 
        <video id="livePreview" autoplay playsinline muted></video>

        <canvas id="captureCanvas" style="display:none;"></canvas>
        <div id="countdown"></div>
        <div class="capture-overlay">
          <button class="capture-ring-btn" id="captureBtn" onclick="takePhoto()" title="Take Photos">
            <div class="inner-dot"></div>
          </button>
        </div>
      </div>
    </div>

    <div id="photoRectangles" class="rectangles-container"></div>

    <div class="card">
      <div class="card-header">
        <span class="card-label">Your collage</span>
        <button class="download-btn" id="downloadBtn" onclick="downloadPhoto()" disabled>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 1v9M4.5 6.5 8 10l3.5-3.5M2 12h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download
        </button>
      </div>

      <div class="collage-area" id="collageArea">
        <span class="collage-empty-state" id="emptyState">Your collage will appear here</span>
        <img id="result" alt="Collage result" />
      </div>
    </div>

    <div id="flash"></div>

    <div class="theme-toggle-bar">
      <div class="theme-toggle-inner">
        <svg class="theme-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.884 5.116a.75.75 0 0 0 1.06 1.06l1.59-1.59a.75.75 0 0 0-1.06-1.06l-1.59 1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5h2.25a.75.75 0 0 1 .75.75ZM17.823 18.884a.75.75 0 0 0 1.06-1.06l-1.59-1.59a.75.75 0 0 0-1.06 1.06l1.59 1.59ZM12 18.75a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0v-2.25a.75.75 0 0 1 .75-.75ZM5.116 18.884a.75.75 0 0 0-1.06-1.06l-1.59 1.59a.75.75 0 0 0 1.06 1.06l1.59-1.59ZM4.5 12a.75.75 0 0 1-.75-.75H1.5a.75.75 0 0 1 0 1.5h2.25a.75.75 0 0 1 .75-.75ZM6.177 5.116a.75.75 0 0 0-1.06 1.06l-1.59-1.59a.75.75 0 0 0 1.06-1.06l1.59 1.59Z" />
        </svg>

        <label class="toggle-switch" title="Toggle theme">
          <input type="checkbox" id="themeToggle" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>

        <svg class="theme-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z" />
        </svg>

        <span class="theme-label" id="themeLabel"></span>
      </div>

      <div class="footer-credit">
        <a href="https://github.com/Karthik-Beesabathini/SnapForge" target="_blank" class="github-link" title="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
        </a>
        <span>© 2026 Created by Bekka, Sri Hari, DGK & Lynx</span>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
